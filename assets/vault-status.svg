<svg xmlns="http://www.w3.org/2000/svg" width="500" height="220" viewBox="0 0 500 220">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect width="500" height="220" fill="url(#bg)"/>

  <g opacity="0.05" fill="#3b82f6">
    <rect y="0" width="500" height="1"/>
    <rect y="20" width="500" height="1"/>
    <rect y="40" width="500" height="1"/>
    <rect y="60" width="500" height="1"/>
    <rect y="80" width="500" height="1"/>
    <rect y="100" width="500" height="1"/>
    <rect y="120" width="500" height="1"/>
    <rect y="140" width="500" height="1"/>
    <rect y="160" width="500" height="1"/>
    <rect y="180" width="500" height="1"/>
    <rect y="200" width="500" height="1"/>
  </g>

  <rect x="1" y="1" width="498" height="218" fill="none" stroke="#1e3a5f" stroke-width="1"/>

  <g stroke="#3b82f6" stroke-width="1.5" fill="none">
    <path d="M 12 12 L 12 28 M 12 12 L 28 12"/>
    <path d="M 488 12 L 488 28 M 488 12 L 472 12"/>
    <path d="M 12 208 L 12 192 M 12 208 L 28 208"/>
    <path d="M 488 208 L 488 192 M 488 208 L 472 208"/>
  </g>

  <text x="20" y="35" fill="#3b82f6" font-family="monospace" font-size="11" letter-spacing="3">VAULT-TEC // STATUS</text>
  <g>
    <text x="480" y="35" text-anchor="end" fill="#f59e0b" font-family="monospace" font-size="11" letter-spacing="3">ONLINE  ◉</text>
    <animate attributeName="opacity" values="1;0.4;1" dur="1.6s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(250 110)" filter="url(#glow)">
    <circle r="60" stroke="#3b82f6" stroke-width="1" fill="none">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="r" values="55;65;55" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="48" stroke="#3b82f6" stroke-width="1" fill="none" opacity="0.3"/>
    <circle r="11" fill="#3b82f6" opacity="0.85">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <path d="M0 -14 L-13 -42 A38 38 0 0 1 13 -42 Z" fill="#3b82f6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M-12 7 L-39 22 A38 38 0 0 1 -27 -3 Z" fill="#3b82f6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="0.66s"/>
    </path>
    <path d="M12 7 L39 22 A38 38 0 0 1 27 -3 Z" fill="#3b82f6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="1.33s"/>
    </path>
  </g>

  <text x="250" y="195" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11" letter-spacing="4">ALL SYSTEMS NOMINAL</text>
</svg>
